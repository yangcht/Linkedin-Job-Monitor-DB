[search]
# First-run defaults only. The web app copies these into an editable Search Setup
# the first time it opens the database. After that, add/edit/pause searches in the UI.
#
# Each keyword becomes its own public LinkedIn Jobs search. This behaves like
# checking several manual searches and avoids relying on logged-in search state.
keywords = Azure, PowerBI, marine, logistics, RAG
location = Gothenburg, Västra Götaland County, Sweden

# LinkedIn's public Gothenburg area search pages currently use this geoId.
# If LinkedIn opens a different Gothenburg URL for you, paste its geoId here.
geo_id = 90009607

# Optional: a LinkedIn URL you use manually while logged in. Public fetching can
# return a sign-in page for this URL, so the app exposes it for opening and
# importing saved HTML. Refresh uses the generated keyword URLs above.
ai_search_url = https://www.linkedin.com/jobs/search-results/?currentJobId=4405221860&keywords=Azure%2C%20powerBI%2C%20marine%2C%20logistics%2C%20RAG%20posted%20in%20the%20past%20week%20within%20300%20km%20from%20Gothenburg%20posted%20in%20the%20past%20week&origin=SUGGESTION

# LinkedIn's URL distance parameter is commonly interpreted as miles.
# 300 km is about 186.4 miles, so the generated distance value rounds up to 187.
radius_km = 300
posted_within_days = 7
sort_by = DD

[run]
db_file = .job_state/jobs.sqlite3
state_file = .job_state/jobs.json
report_dir = reports
request_delay_seconds = 2
user_agent = Mozilla/5.0 linked-jobs-monitor/0.1
